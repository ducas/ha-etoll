name: Feature request
description: Suggest a new sensor, behaviour, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: affected_sensors
    attributes:
      label: Which sensors or behaviour would change?
      description: e.g. "new sensor for rebate_remaining", "weekly_cap default updated"
  - type: input
    id: rule_source
    attributes:
      label: Official source for any scheme rule changes
      description: Link to Transport for NSW announcement or scheme documentation.
      placeholder: "https://www.transport.nsw.gov.au/..."
